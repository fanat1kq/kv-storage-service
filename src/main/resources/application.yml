spring:
  application:
    name: ${SPRING_APPLICATION_NAME:kv-storage-service}
  config:
    import: optional:file:.env.example[.properties]
tarantool:
  host: ${TARANTOOL_HOST:localhost}
  port: ${TARANTOOL_PORT:3301}
  user: ${TARANTOOL_USER:guest}
  password: ${TARANTOOL_PASSWORD:}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:8080}

logging:
  level:
    ru.example.kvstorageservice.service: DEBUG